<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Quest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;700&display=swap');
:root {
  --parchment:#f5ead6;--parchment-dark:#e8d5b0;--ink:#2c1810;--ink-light:#5a3a28;
  --gold:#8b6914;--gold-bright:#c9a52a;--crimson:#8b1a1a;--sand:#c4a882;--olive:#6b7c4a;--stone:#9b8b7a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);font-family:'EB Garamond',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
#app{width:100%;max-width:480px;min-height:100vh;background:var(--parchment);position:relative;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}

/* HOME */
#home-screen{align-items:center;justify-content:center;padding:40px 24px;background:linear-gradient(180deg,#1a0f08 0%,#2c1810 100%);}
.home-scroll{width:280px;background:var(--parchment);padding:32px 24px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.6);position:relative;}
.home-scroll::before,.home-scroll::after{content:'';display:block;height:14px;background:var(--parchment-dark);margin:0 -24px;}
.home-scroll::before{border-radius:50% 50% 0 0/8px 8px 0 0;}
.home-scroll::after{border-radius:0 0 50% 50%/0 0 8px 8px;margin-top:2px;}
.home-cross{font-size:40px;color:var(--gold);margin-bottom:12px;display:block;}
.home-title{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--ink);letter-spacing:2px;line-height:1.1;}
.home-title span{color:var(--gold);}
.home-sub{font-size:13px;color:var(--ink-light);font-style:italic;margin:8px 0 20px;}
.home-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.home-stat{background:var(--parchment-dark);padding:8px;text-align:center;}
.home-stat-num{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold);}
.home-stat-label{font-size:10px;color:var(--stone);text-transform:uppercase;letter-spacing:1px;}
.btn-primary{width:100%;padding:14px;background:var(--ink);color:var(--gold-bright);font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;}
.btn-primary:active{opacity:.8;}

/* MAP */
#map-screen{background:var(--parchment);}
.map-header{background:var(--ink);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.map-title{font-family:'Cinzel',serif;font-size:14px;color:var(--gold-bright);letter-spacing:2px;}
.player-badge{font-family:'Cinzel',serif;font-size:11px;color:var(--sand);}
.map-scroll-area{flex:1;overflow-y:auto;padding:20px 16px 100px;}
.territory-path{display:flex;flex-direction:column;gap:0;position:relative;}
.territory-path::before{content:'';position:absolute;left:36px;top:30px;bottom:30px;width:2px;background:repeating-linear-gradient(to bottom,var(--sand) 0,var(--sand) 8px,transparent 8px,transparent 16px);}
.territory-node{display:flex;align-items:center;gap:16px;padding:12px 8px;cursor:pointer;position:relative;z-index:1;}
.territory-node.locked{opacity:.4;cursor:default;}
.territory-circle{width:52px;height:52px;border-radius:50%;border:2px solid var(--sand);background:var(--parchment-dark);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:22px;position:relative;}
.territory-node.unlocked .territory-circle{border-color:var(--gold);box-shadow:0 2px 12px rgba(139,105,20,.3);}
.territory-node.completed .territory-circle{background:var(--olive);border-color:var(--olive);}
.territory-node.active-territory .territory-circle{border-color:var(--gold-bright);animation:glow 2s infinite alternate;}
@keyframes glow{from{box-shadow:0 0 0 4px rgba(201,165,42,.2);}to{box-shadow:0 0 0 4px rgba(201,165,42,.4),0 4px 20px rgba(139,105,20,.5);}}
.check-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--olive);border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;color:white;border:2px solid var(--parchment);}
.territory-info{flex:1;}
.territory-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--ink);}
.territory-node.locked .territory-name{color:var(--stone);}
.territory-desc{font-size:12px;color:var(--ink-light);font-style:italic;margin-top:2px;}
.territory-progress{font-size:11px;color:var(--stone);margin-top:4px;}
.territory-stars{font-size:14px;}
.map-bottom{position:fixed;bottom:0;width:100%;max-width:480px;background:var(--ink);padding:12px 20px;display:flex;align-items:center;z-index:10;}
.xp-bar-wrap{flex:1;margin:0 16px;}
.xp-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:var(--stone);text-transform:uppercase;margin-bottom:4px;}
.xp-track{height:4px;background:rgba(255,255,255,.1);}
.xp-fill{height:100%;background:var(--gold-bright);transition:width .5s;}
.level-badge{font-family:'Cinzel',serif;font-size:10px;color:var(--gold-bright);text-align:center;min-width:48px;}
.level-num{font-size:20px;font-weight:700;display:block;line-height:1;}

/* QUIZ */
#quiz-screen{background:var(--parchment);}
.quiz-header{background:var(--ink);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.back-btn{background:none;border:none;color:var(--gold-bright);font-size:18px;cursor:pointer;padding:4px;}
.quiz-territory-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold-bright);letter-spacing:1px;flex:1;}
.quiz-progress-text{font-size:12px;color:var(--stone);}
.quiz-timer-bar{height:3px;background:var(--parchment-dark);}
.quiz-timer-fill{height:100%;background:var(--gold-bright);transition:width .1s linear;}
.quiz-body{flex:1;padding:24px 20px;display:flex;flex-direction:column;gap:20px;}
.quiz-q-num{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--stone);text-transform:uppercase;}
.quiz-question{font-size:20px;color:var(--ink);line-height:1.45;font-weight:600;}
.quiz-options{display:flex;flex-direction:column;gap:10px;}
.quiz-option{padding:14px 16px;background:var(--parchment-dark);border:1.5px solid transparent;text-align:left;font-family:'EB Garamond',serif;font-size:16px;color:var(--ink);cursor:pointer;}
.quiz-option:active{background:#dcc899;}
.quiz-option.correct{background:#d4edda;border-color:var(--olive);color:#2d5a3d;}
.quiz-option.wrong{background:#f8d7da;border-color:var(--crimson);color:var(--crimson);}
.quiz-feedback{min-height:60px;padding:14px 16px;background:var(--parchment-dark);border-left:3px solid var(--gold);font-size:14px;color:var(--ink-light);font-style:italic;display:none;}
.quiz-feedback.visible{display:block;}
.quiz-feedback.correct-fb{border-color:var(--olive);}
.quiz-feedback.wrong-fb{border-color:var(--crimson);}
.quiz-next-btn{padding:14px;background:var(--ink);color:var(--gold-bright);font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;display:none;margin-top:auto;}
.quiz-next-btn.visible{display:block;}

/* RESULT */
#result-screen{background:var(--ink);align-items:center;justify-content:center;padding:40px 24px;}
.result-scroll{background:var(--parchment);width:100%;max-width:320px;padding:32px 24px;text-align:center;}
.result-icon{font-size:48px;margin-bottom:12px;}
.result-title{font-family:'Cinzel',serif;font-size:20px;color:var(--ink);margin-bottom:6px;}
.result-territory{font-size:13px;color:var(--stone);font-style:italic;margin-bottom:20px;}
.result-score-big{font-family:'Cinzel',serif;font-size:48px;font-weight:700;color:var(--gold);line-height:1;}
.result-score-label{font-size:13px;color:var(--stone);margin-bottom:16px;}
.result-stars{font-size:28px;letter-spacing:4px;margin-bottom:20px;}
.result-verse{font-size:13px;color:var(--ink-light);font-style:italic;border-top:1px solid var(--sand);border-bottom:1px solid var(--sand);padding:12px 0;margin-bottom:20px;line-height:1.5;}
.result-verse-ref{font-size:11px;color:var(--stone);margin-top:4px;}
.result-xp{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);margin-bottom:20px;}
.result-btns{display:flex;flex-direction:column;gap:8px;}
.btn-secondary{padding:12px;background:var(--parchment-dark);color:var(--ink);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;}
.share-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--stone);text-align:center;margin-top:4px;}
.share-row{display:flex;gap:8px;}
.share-btn{flex:1;padding:11px 6px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;color:white;font-weight:700;}
.share-btn:active{opacity:.8;}
.share-wa{background:#25d366;}
.share-fb{background:#1877f2;}
.share-tt{background:#010101;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--parchment);padding:10px 18px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home-screen" class="screen active">
  <div class="home-scroll">
    <span class="home-cross">&#10011;</span>
    <div class="home-title">BIBLE <span>QUEST</span></div>
    <div class="home-sub">Marchez dans les traces des Ecritures</div>
    <div class="home-stats">
      <div class="home-stat"><div class="home-stat-num" id="home-territories">0/12</div><div class="home-stat-label">Territoires</div></div>
      <div class="home-stat"><div class="home-stat-num" id="home-level">1</div><div class="home-stat-label">Niveau</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button onclick="setLang('fr')" id="btn-fr" style="flex:1;padding:8px;font-family:Cinzel,serif;font-size:11px;letter-spacing:2px;border:1.5px solid var(--gold);background:var(--ink);color:var(--gold-bright);cursor:pointer;">FR</button>
      <button onclick="setLang('en')" id="btn-en" style="flex:1;padding:8px;font-family:Cinzel,serif;font-size:11px;letter-spacing:2px;border:1.5px solid var(--sand);background:transparent;color:var(--stone);cursor:pointer;">EN</button>
    </div>
    <button class="btn-primary" id="start-btn" onclick="showMap()">COMMENCER LA QUETE</button>
  </div>
</div>

<!-- MAP -->
<div id="map-screen" class="screen">
  <div class="map-header">
    <div class="map-title" id="map-title">TERRE SAINTE</div>
    <div class="player-badge" id="map-player-badge">Disciple</div>
  </div>
  <div class="map-scroll-area"><div class="territory-path" id="territory-path"></div></div>
  <div class="map-bottom">
    <div class="level-badge"><span class="level-num" id="map-level">1</span>NIV</div>
    <div class="xp-bar-wrap">
      <div class="xp-label">Experience</div>
      <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>
    <div style="font-family:'Cinzel',serif;font-size:11px;color:var(--stone);text-align:right;"><span id="xp-current">0</span> XP</div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="showMap()">&#8592;</button>
    <div class="quiz-territory-name" id="quiz-territory-name"></div>
    <div class="quiz-progress-text" id="quiz-progress-text"></div>
  </div>
  <div class="quiz-timer-bar"><div class="quiz-timer-fill" id="quiz-timer-fill"></div></div>
  <div class="quiz-body">
    <div class="quiz-q-num" id="quiz-q-num"></div>
    <div class="quiz-question" id="quiz-question"></div>
    <div class="quiz-options" id="quiz-options"></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <button class="quiz-next-btn" id="quiz-next-btn" onclick="nextQuestion()">CONTINUER</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-scroll">
    <div class="result-icon" id="result-icon">&#127942;</div>
    <div class="result-title" id="result-title">Territoire Conquis</div>
    <div class="result-territory" id="result-territory-name"></div>
    <div class="result-score-big" id="result-score"></div>
    <div class="result-score-label">bonnes reponses</div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-verse"><div id="result-verse-text"></div><div class="result-verse-ref" id="result-verse-ref"></div></div>
    <div class="result-xp" id="result-xp"></div>
    <div class="result-btns">
      <button class="btn-primary" onclick="showMap()">RETOUR A LA CARTE</button>
      <div class="share-label">Partager mon brevet</div>
      <div class="share-row">
        <button class="share-btn share-wa" onclick="shareResult('whatsapp')">WhatsApp</button>
        <button class="share-btn share-fb" onclick="shareResult('facebook')">Facebook</button>
        <button class="share-btn share-tt" onclick="shareResult('tiktok')">TikTok</button>
      </div>
      <button class="btn-secondary" onclick="replayTerritory()">REJOUER</button>
      <button class="btn-secondary" onclick="showLeaderboard()">CLASSEMENT</button>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard-screen" class="screen" style="background:var(--parchment);padding:0 0 80px;">
  <div style="background:var(--ink);padding:14px 20px;display:flex;align-items:center;gap:12px;">
    <button style="background:none;border:none;color:var(--gold-bright);font-size:18px;cursor:pointer;" onclick="showMap()">&#8592;</button>
    <div style="font-family:'Cinzel',serif;font-size:14px;color:var(--gold-bright);letter-spacing:2px;">CLASSEMENT</div>
  </div>
  <div style="padding:16px 20px;">
    <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--stone);text-transform:uppercase;margin-bottom:12px;">Score max + temps minimal = 1er rang</div>
    <div style="margin-bottom:16px;">
      <input id="player-name-input" type="text" placeholder="Ton nom" maxlength="20"
        style="width:100%;padding:10px 12px;background:var(--parchment-dark);border:1px solid var(--sand);font-family:'EB Garamond',serif;font-size:15px;color:var(--ink);"
        oninput="saveName(this.value)">
    </div>
    <div id="leaderboard-list"></div>
  </div>
</div>
</div>
<script>
// ============================================================
// DATA — all strings ASCII-safe, emojis via unicode escapes
// ============================================================
var T1 = [
  { id:'creation', name:'Eden', icon:'\u{1F331}', desc:'La Genese', verse:'"Au commencement, Dieu crea les cieux et la terre."', verseRef:'Genese 1:1',
    questions:[
      {q:'En combien de jours Dieu crea-t-il le monde ?', options:['5 jours','6 jours','7 jours','10 jours'], answer:1, expl:'Dieu crea en 6 jours et se reposa le 7e (Genese 1-2).'},
      {q:'Comment s\'appelait la femme creee par Dieu pour Adam ?', options:['Sara','Eve','Marie','Rebecca'], answer:1, expl:'Eve fut creee a partir d\'une cote d\'Adam (Genese 2:22).'},
      {q:'Quel fruit etait interdit dans le jardin d\'Eden ?', options:['La figue','L\'olive','Le fruit de l\'arbre de la connaissance','Le raisin'], answer:2, expl:'Dieu interdit de manger du fruit de l\'arbre de la connaissance du bien et du mal.'},
      {q:'Sous quelle forme le tentateur apparut-il a Eve ?', options:['Un lion','Un serpent','Un aigle','Un homme'], answer:1, expl:'Le serpent etait le plus ruse des animaux des champs (Genese 3:1).'},
      {q:'Quels deux fils d\'Adam et Eve sont mentionnes en premier ?', options:['Jacob et Esau','Abraham et Lot','Cain et Abel','Sem et Cham'], answer:2, expl:'Cain et Abel sont les premiers fils d\'Adam et Eve (Genese 4).'}
    ]},
      {q:'Quel etait le role de l homme dans le jardin d Eden ?', options:['Le garder et le cultiver','Y habiter seulement','Nommer les animaux seulement','Le contempler'], answer:0, expl:'Dieu plaça l homme dans le jardin pour le cultiver et le garder (Genese 2:15).'},
      {q:'Quel jour Dieu crea-t-il les luminaires ?', options:['Jour 2','Jour 3','Jour 4','Jour 5'], answer:2, expl:'Dieu fit les deux grands luminaires le quatrieme jour (Genese 1:16).'},
      {q:'Quel jour Dieu crea-t-il les poissons et les oiseaux ?', options:['Jour 3','Jour 4','Jour 5','Jour 6'], answer:2, expl:'Les creatures aquatiques et les oiseaux furent crees le cinquieme jour (Genese 1:20-23).'},
      {q:'Qu est-ce que Dieu fit a partir de la cote d Adam ?', options:['Un animal','La femme','Un arbre','Un ange'], answer:1, expl:'L Eternel Dieu fit une femme de la cote qu il avait prise de l homme (Genese 2:22).'},
      {q:'Que signifia le nom Eve ?', options:['Lumiere','Mere de tous les vivants','Bien-aimee','Sagesse'], answer:1, expl:'Adam appela sa femme Eve parce qu elle etait la mere de tous les vivants (Genese 3:20).'},
      {q:'Qu arriva-t-il a Cain apres qu il eut tue Abel ?', options:['Il fut execute','Il fut maudit et chasse','Il devint roi','Il fut pardonne immediatement'], answer:1, expl:'Dieu maudit Cain et le chassa de la terre (Genese 4:11-12).'},
      {q:'Quel personnage ne mourut pas mais fut enleve par Dieu ?', options:['Adam','Seth','Enoch','Lamech'], answer:2, expl:'Enoch marcha avec Dieu, puis il disparut car Dieu l enleva (Genese 5:24).'},
      {q:'Quel fils de Adam et Eve remplaça Abel ?', options:['Cain','Seth','Enos','Kenan'], answer:1, expl:'Eve donna naissance a Seth comme autre descendance a la place d Abel (Genese 4:25).'},
      {q:'De quoi etaient faites les vetements que Dieu fit a Adam et Eve ?', options:['De feuilles de figuier','De peaux de betes','De lin','De laine'], answer:1, expl:'L Eternel Dieu fit a Adam et a sa femme des habits de peau (Genese 3:21).'},
      {q:'Quel age avait Mathusalem, l homme le plus vieux de la Bible ?', options:['900 ans','950 ans','969 ans','999 ans'], answer:2, expl:'Mathusalem vecut 969 ans, c est le plus vieux personnage biblique (Genese 5:27).'},
  { id:'noe', name:'Ararat', icon:'\u{1F54A}', desc:'Noe et le Deluge', verse:'"J\'etablis mon alliance avec vous."', verseRef:'Genese 9:11',
    questions:[
      {q:'Pourquoi Dieu envoya-t-il le deluge ?', options:['Une secheresse','La mechancete des hommes','Une guerre','La desobeissance de Noe'], answer:1, expl:'Dieu vit que la mechancete des hommes etait grande sur la terre (Genese 6:5).'},
      {q:'Combien de paires d\'animaux impurs Noe prit-il dans l\'arche ?', options:['1 paire','2 paires','7 paires','10 paires'], answer:0, expl:'Une paire (male et femelle) de chaque animal impur (Genese 7:2).'},
      {q:'Combien de jours dura la pluie lors du deluge ?', options:['7 jours','20 jours','40 jours','100 jours'], answer:2, expl:'La pluie tomba quarante jours et quarante nuits (Genese 7:12).'},
      {q:'Quel oiseau Noe envoya-t-il pour voir si les eaux avaient baisse ?', options:['Un aigle','Un corbeau puis une colombe','Un moineau','Un faucon'], answer:1, expl:'Noe envoya d\'abord un corbeau, puis une colombe (Genese 8:6-8).'},
      {q:'Quel signe Dieu donna-t-il a Noe apres le deluge ?', options:['Une etoile','Un arc-en-ciel','Un ange','Une flamme'], answer:1, expl:'L\'arc-en-ciel fut le signe de l\'alliance entre Dieu et toute creature (Genese 9:13).'}
    ]},
      {q:'Quel bois Noe utilisa-t-il pour construire l arche ?', options:['Cedre','Bois de gopher','Chene','Acacia'], answer:1, expl:'Dieu dit a Noe : Fais-toi une arche en bois de gopher (Genese 6:14).'},
      {q:'Quel age avait Noe quand commença le deluge ?', options:['500 ans','600 ans','700 ans','800 ans'], answer:1, expl:'Noe avait six cents ans quand le deluge couvrit la terre (Genese 7:6).'},
      {q:'Que fit Noe apres etre sorti de l arche ?', options:['Construisit une ville','Batit un autel et offrit des holocaustes','Planta une vigne immediatement','Envoya des messagers'], answer:1, expl:'Noe batit un autel a l Eternel et offrit des holocaustes (Genese 8:20).'},
      {q:'Combien de fils Noe avait-il ?', options:['2','3','4','5'], answer:1, expl:'Noe eut trois fils : Sem, Cham et Japhet (Genese 6:10).'},
      {q:'Que fit Cham qui offensa Noe ?', options:['Il vola sa nourriture','Il vit la nudite de son pere et le dit a ses freres','Il quitta la famille','Il brula l autel'], answer:1, expl:'Cham vit la nudite de son pere et le raconta a ses deux freres (Genese 9:22).'},
      {q:'Quel fils de Noe fut maudit ?', options:['Sem','Cham lui-meme','Canaan fils de Cham','Japhet'], answer:2, expl:'Noe maudit Canaan, le fils de Cham (Genese 9:25).'},
      {q:'Combien d etages avait l arche ?', options:['1','2','3','4'], answer:2, expl:'L arche avait un bas, un second et un troisieme etage (Genese 6:16).'},
      {q:'Qu est-ce que Dieu permit a Noe de manger apres le deluge ?', options:['Seulement les vegetaux','Les animaux mais pas le sang','Tout sans restriction','Seulement les animaux purs'], answer:1, expl:'Dieu permit de manger les animaux mais interdit de consommer le sang (Genese 9:3-4).'},
      {q:'A quel endroit la tour de Babel fut-elle construite ?', options:['En Egypte','Au pays de Shinear','En Canaan','En Mesopotamie du Nord'], answer:1, expl:'Les hommes trouverent une plaine au pays de Shinear et s y etablirent (Genese 11:2).'},
      {q:'Quelle langue parlait l humanite avant la tour de Babel ?', options:['L hebreu','L arameen','Une seule langue','Le grec'], answer:2, expl:'Toute la terre avait une seule langue et les memes mots (Genese 11:1).'},
  { id:'abraham', name:'Canaan', icon:'\u26FA', desc:'Abraham, Pere des Nations', verse:'"Je ferai de toi une grande nation."', verseRef:'Genese 12:2',

var XP_PER_LEVEL = 100;
var RANKS = ['Disciple','Apotre','Prophete','Patriarche','Docteur de la Foi'];

function getCurSeasons(){ return LANG==='en' ? SEASONS_EN : SEASONS; }
function curSeason(){ return getCurSeasons()[Math.min(S.season, getCurSeasons().length-1)]; }
function curTerritories(){ return curSeason().territories; }
function getTerritoryStore(){ return LANG==='en' ? S.territoriesEN : S.territoriesFR; }
function getRank(){ return RANKS[Math.min(S.season, RANKS.length-1)]; }
function getTimerMs(){ return curSeason().timerMs; }

function getStars(score,total){
  if(score===total) return 3;
  if(score>=total*0.7) return 2;
  if(score>=total*0.4) return 1;
  return 0;
}

function isSeasonComplete(){
  return curTerritories().every(function(t){
    return getTerritoryStore()[t.id] && getTerritoryStore()[t.id].score === 5;
  });
}

function isTerritoryUnlocked(idx){
  if(idx===0) return true;
  var prev = curTerritories()[idx-1];
  return !!(getTerritoryStore()[prev.id] && getTerritoryStore()[prev.id].score >= 4);
}

// ============================================================
// SHUFFLE
// ============================================================
function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  return a;
}

function shuffleTerritory(base){
  // Pick 5 random questions from the pool, shuffle their options
  var picked = shuffle(base.questions).slice(0, 5);
  var qs = picked.map(function(q){
    var opts = q.options.map(function(o,i){ return {text:o, isAnswer:i===q.answer}; });
    var so = shuffle(opts);
    return Object.assign({},q,{options:so.map(function(o){return o.text;}), answer:so.findIndex(function(o){return o.isAnswer;})});
  });
  return Object.assign({},base,{questions:qs});
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

function showHome(){
  var ts = curTerritories();
  var done = ts.filter(function(t){return getTerritoryStore()[t.id]&&getTerritoryStore()[t.id].completed;}).length;
  document.getElementById('home-territories').textContent = done+'/'+ts.length;
  document.getElementById('home-level').textContent = S.level;
  showScreen('home-screen');
}

function showMap(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  renderMap();
  showScreen('map-screen');
}

function renderMap(){
  var season = curSeason();
  var diffFr = ['','Facile','Intermediaire','Difficile','Expert'];
  var diffEn = ['','Easy','Intermediate','Hard','Expert'];
  var diff = (LANG==='en'?diffEn:diffFr)[season.difficulty]||'';
  document.getElementById('map-title').textContent = season.name.toUpperCase();
  document.getElementById('map-player-badge').textContent = getRank()+' \u00B7 '+diff;
  document.getElementById('map-level').textContent = S.level;
  var xpPct = (S.xp%XP_PER_LEVEL)/XP_PER_LEVEL*100;
  document.getElementById('xp-fill').style.width = xpPct+'%';
  document.getElementById('xp-current').textContent = S.xp;

  var html = curTerritories().map(function(t,i){
    var unlocked = isTerritoryUnlocked(i);
    var data = getTerritoryStore()[t.id]||{};
    var completed = !!data.completed;
    var stars = data.stars||0;
    var isActive = unlocked&&!completed;
    var cls = 'territory-node'+(completed?' completed':unlocked?' unlocked':'  locked')+(isActive?' active-territory':'');
    var starStr = '\u2605'.repeat(stars)+'\u2606'.repeat(3-stars);
    var badge = completed?'<div class="check-badge">\u2713</div>':'';
    var onclick = unlocked?'onclick="startTerritory(\''+t.id+'\')"':'';
    return '<div class="'+cls+'" '+onclick+'>'
      +'<div class="territory-circle">'+t.icon+badge+'</div>'
      +'<div class="territory-info">'
        +'<div class="territory-name">'+t.name+'</div>'
        +'<div class="territory-desc">'+t.desc+'</div>'
        +'<div class="territory-progress">'+(completed?'<span class="territory-stars">'+starStr+'</span>':unlocked?t.questions.length+' '+UI[LANG]['ready']:UI[LANG]['locked'])+'</div>'
      +'</div></div>';
  }).join('');
  document.getElementById('territory-path').innerHTML = html;
}

// ============================================================
// QUIZ
// ============================================================
function startTerritory(id){
  var base = curTerritories().find(function(t){return t.id===id;});
  if(!base) return;
  S.currentTerritory = shuffleTerritory(base);
  S.currentQ = 0; S.score = 0; S.answered = false; S.totalTimeMs = 0;
  document.getElementById('quiz-territory-name').textContent = S.currentTerritory.name;
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion(){
  var t = S.currentTerritory;
  var q = t.questions[S.currentQ];
  var total = t.questions.length;
  document.getElementById('quiz-q-num').textContent = UI[LANG]['question']+' '+(S.currentQ+1)+' '+UI[LANG]['sur']+' '+total;
  document.getElementById('quiz-progress-text').textContent = S.score+'/'+total;
  document.getElementById('quiz-question').textContent = q.q;
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-next-btn').className = 'quiz-next-btn';
  S.answered = false;
  S.questionStartTime = Date.now();
  document.getElementById('quiz-options').innerHTML = q.options.map(function(o,i){
    return '<button class="quiz-option" onclick="answerQ('+i+')">'+o+'</button>';
  }).join('');
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  S.timerVal = 100;
  document.getElementById('quiz-timer-fill').style.width = '100%';
  S.timerInterval = setInterval(function(){
    S.timerVal -= 0.5;
    document.getElementById('quiz-timer-fill').style.width = S.timerVal+'%';
    if(S.timerVal<=0){ clearInterval(S.timerInterval); S.timerInterval=null; if(!S.answered) answerQ(-1); }
  }, getTimerMs());
}

function answerQ(chosen){
  if(S.answered) return;
  S.answered = true;
  S.totalTimeMs += (Date.now() - S.questionStartTime);
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  var q = S.currentTerritory.questions[S.currentQ];
  var correct = chosen===q.answer;
  document.querySelectorAll('.quiz-option').forEach(function(btn,i){
    btn.disabled = true;
    if(i===q.answer) btn.classList.add('correct');
    if(i===chosen&&!correct) btn.classList.add('wrong');
  });
  var fb = document.getElementById('quiz-feedback');
  fb.className = 'quiz-feedback visible '+(correct?'correct-fb':'wrong-fb');
  fb.textContent = (correct?UI[LANG]['exact']:UI[LANG]['incorrect'])+q.expl;
  if(correct) S.score++;
  document.getElementById('quiz-progress-text').textContent = S.score+'/'+S.currentTerritory.questions.length;
  document.getElementById('quiz-next-btn').className = 'quiz-next-btn visible';
}

function nextQuestion(){
  S.currentQ++;
  if(S.currentQ>=S.currentTerritory.questions.length){ showResult(); }
  else { renderQuestion(); }
}

// ============================================================
// RESULT
// ============================================================
function showResult(){
  var t = S.currentTerritory;
  var total = t.questions.length;
  var stars = getStars(S.score, total);
  var season = curSeason();
  var xpGained = (S.score*10+stars*20)*season.difficulty;
  S.lastResultScore = S.score; S.lastResultTotal = total;

  var passed = S.score >= 4;
  var perfect = S.score === total;
  var prev = getTerritoryStore()[t.id]||{};
  getTerritoryStore()[t.id] = {
    completed: passed,
    score: Math.max(S.score, prev.score||0),
    stars: Math.max(stars, prev.stars||0)
  };
  if(passed){ S.xp += xpGained; S.level = Math.floor(S.xp/XP_PER_LEVEL)+1; }

  var seasonDone = isSeasonComplete();
  var hasNext = S.season<getCurSeasons().length-1;

  var icon, title;
  if(!passed){
    icon = '\u{1F4D6}'; title = UI[LANG]['score_insuffisant'];
  } else if(seasonDone&&hasNext){
    icon = '\u2728'; title = UI[LANG]['saison_ok'];
  } else if(perfect){
    icon = '\u{1F3C6}'; title = UI[LANG]['parfait'];
  } else {
    icon = '\u271D'; title = UI[LANG]['conquis'];
  }
  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-territory-name').textContent = t.icon+' '+t.name+' \u2014 '+t.desc;
  document.getElementById('result-score').textContent = S.score+'/'+total;
  document.getElementById('result-stars').textContent = '\u2605'.repeat(stars)+'\u2606'.repeat(3-stars);
  document.getElementById('result-verse-text').textContent = t.verse;
  document.getElementById('result-verse-ref').textContent = t.verseRef;

  // Save leaderboard entry if passed
  var timeSecStr = (S.totalTimeMs/1000).toFixed(1)+'s';
  if(passed){
    var entry = {
      name: S.playerName || 'Anonyme',
      territory: t.name,
      score: S.score,
      total: total,
      timeMs: S.totalTimeMs,
      stars: stars,
      date: new Date().toLocaleDateString('fr-FR')
    };
    S.leaderboard.push(entry);
    S.leaderboard.sort(function(a,b){
      if(b.score !== a.score) return b.score - a.score;
      return a.timeMs - b.timeMs;
    });
    S.leaderboard = S.leaderboard.slice(0,20);
    try{ if(typeof localStorage!=='undefined') localStorage.setItem('bq_leaderboard', JSON.stringify(S.leaderboard)); }catch(e){}
  }
  var xpMsg = '+'+xpGained+' XP \u00B7 Niveau '+S.level+(passed?' \u00B7 Temps: '+timeSecStr:'');
  if(seasonDone&&hasNext){ S.season++; xpMsg += ' \u00B7 '+UI[LANG]['nouvelle_saison']+getCurSeasons()[S.season].name; }
  else if(seasonDone&&!hasNext){ xpMsg += ' \u00B7 '+UI[LANG]['docteur']; }
  document.getElementById('result-xp').textContent = xpMsg;
  showScreen('result-screen');
}

function replayTerritory(){
  var base = curTerritories().find(function(t){return t.id===S.currentTerritory.id;});
  if(base) startTerritory(base.id);
}

// ============================================================
// SHARE
// ============================================================
function shareResult(platform){
  var t = S.currentTerritory;
  var season = SEASONS[Math.max(0, S.season-(isSeasonComplete()?1:0))];
  var stars = '\u2605'.repeat(getStars(S.lastResultScore, S.lastResultTotal));
  var rank = getRank();
  var text = (LANG==='en'?'I just conquered "'+t.name+'" on Bible Quest! ':'J\'ai conquis "'+t.name+'" sur Bible Quest ! ')+stars+'\n'
    +'Score : '+S.lastResultScore+'/'+S.lastResultTotal+' \u2014 Rang : '+rank+'\n'
    +'Saison : '+season.name+'\n'
    +'Teste ta connaissance biblique : [lien Play Store]';
  var enc = encodeURIComponent(text);
  if(platform==='whatsapp'){
    window.open('https://wa.me/?text='+enc,'_blank');
  } else if(platform==='facebook'){
    copyText(text);
    window.open('https://www.facebook.com/sharer/sharer.php?quote='+enc+'&u=https://bible-quest.app','_blank');
  } else if(platform==='tiktok'){
    copyText(text);
    toast('Texte copie. Colle-le dans ta video TikTok.');
  }
}

function copyText(text){
  if(navigator.clipboard){ navigator.clipboard.writeText(text).catch(function(){}); }
  else { var el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(el); }
}

function toast(msg){
  var el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

// ============================================================
// LEADERBOARD
// ============================================================
function saveName(val){
  S.playerName = val;
  try{ if(typeof localStorage!=='undefined') localStorage.setItem('bq_name', val); }catch(e){}
}

function showLeaderboard(){
  var input = document.getElementById('player-name-input');
  if(input) input.value = S.playerName;
  renderLeaderboard();
  showScreen('leaderboard-screen');
}

function renderLeaderboard(){
  var el = document.getElementById('leaderboard-list');
  if(!el) return;
  if(S.leaderboard.length === 0){
    el.innerHTML = '<div style="text-align:center;font-style:italic;color:var(--stone);padding:20px;">'+UI[LANG]['no_score']+'</div>';
    return;
  }
  el.innerHTML = S.leaderboard.map(function(e,i){
    var medal = i===0?'\u{1F947}':i===1?'\u{1F948}':i===2?'\u{1F949}':(i+1)+'.';
    var timeSec = (e.timeMs/1000).toFixed(1)+'s';
    var stars = '\u2605'.repeat(e.stars)+'\u2606'.repeat(3-e.stars);
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);">'
      +'<div style="font-family:Cinzel,serif;font-size:16px;min-width:32px;text-align:center;">'+medal+'</div>'
      +'<div style="flex:1;">'
        +'<div style="font-family:Cinzel,serif;font-size:13px;color:var(--ink);">'+e.name+'</div>'
        +'<div style="font-size:11px;color:var(--stone);font-style:italic;">'+e.territory+' \u00B7 '+e.date+'</div>'
      +'</div>'
      +'<div style="text-align:right;">'
        +'<div style="font-family:Cinzel,serif;font-size:14px;color:var(--gold);">'+e.score+'/'+e.total+'</div>'
        +'<div style="font-size:11px;color:var(--stone);">'+timeSec+' \u00B7 '+stars+'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

// ============================================================
// INIT
// ============================================================
showHome();
</script>
